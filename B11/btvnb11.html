<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 11</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
        }
        .header{
            display: flex;
            justify-content: center;
            width: 100%;
            height: 109px;
            align-items: center;
            h2{
                font-size: 40px;
                font-weight: 300;
            }
        }
        input{
            width: 500px;
            height: 60px;
            margin: 20px 0 20px 20px;
            font-size: 16px;
            padding: 20px;
            border-radius: 50px;
        }
        .search{
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }
        .pokemon_list{
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 90%;
            margin: auto;
        }
        .item{
            flex-direction: column;
            align-items: center;
            width: 180px;
            border-radius: 20px;
            padding: 20px;
            border: 1px;
            box-shadow: 0 4px 8px rgb(224, 224, 224);

        }
        .item:hover{
            box-shadow: 0 4px 8px rgb(157, 152, 152);
            transition: 0.5s;
        }
        .image{
            width: 160px;
            height: 160px;
            img{
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        }
        .id{
            width: 100%;
            text-align: center;
        }
        .name{
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            text-transform: capitalize;
        }
        .type{
            padding: 5px 10px;
            color: white;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
            border-radius: 8px;
            color: black;
        }
        .type_list{
            display: flex;
            flex-direction: row;
            gap: 8px;
            justify-content: center;
            text-transform: capitalize;
        }
        .nut{
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        .button{
            width: 140px;
            height: 60px;
            font-size: 18px;
            background-color: rgb(251, 65, 40);
            color: white;
            border: none;
            border-radius: 20px;
        }
        .button:hover{
            background-color: rgb(239, 96, 80);
        }
        .grass{
            background-color: rgb(148, 190, 85);
        }
        .poison{
            background-color: rgb(210, 65, 210);
        }
        .fire{
            background-color: rgb(255, 80, 80);
        }
        .flying{
            background-color: plum;
        }
        .water{
            background-color: rgb(57, 203, 203);
        }
        .bug{
            background-color: rgb(83, 128, 83);
        }
        .normal{
            background-color: rgb(203, 167, 119);
        }
        .electric{
            background-color: rgb(219, 191, 100);
        }
        .ground{
            background-color: rgb(200, 167, 107);
        }
        .fairy{
            background-color: rgb(236, 198, 204);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Pokemon API</h2>
    </div>
    <div class="search">
        <input type="text" placeholder="Search some Pokemon...">
    </div>
    <div class="pokemon_list">
    </div>
    <div class="nut">
        <button class="button">Load More</button>
    </div>
    <script>
        function fetchPromise(URL) {
            return new Promise(function (resolve, reject) {
                fetch(URL)
                    .then(function (response) {
                        const promise = response.json()
                        resolve(promise);
                    })
                    .catch(function (error) {
                        console.log("error")
                    })
            })
        }

        async function main(){
            let pokemons = [];
            const data = await fetchPromise("https://pokeapi.co/api/v2/pokemon/?offset=0&limit=898");
            pokemons = data.results;
            console.log(pokemons[2].name);
            const pokemonPromise = pokemons.map(pokemon => fetchPromise(pokemon.url));
            const pokemonElements = await Promise.all(pokemonPromise);
            const pokemonList = document.querySelector(".pokemon_list");
        
            const button = document.querySelector(".button");
            let size = 24;
            function renderPokemonList(data, size){
                let img = "";
                pokemonList.innerHTML = "";
                for(let i = 0; i < size; i++){
                    img += `<div class="item">
                                <div class="id">#${i+1}</div>
                                <div class="image">
                                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png" alt="${data[i].name}">
                                </div>
                                <div class="name">
                                    <p>${data[i].name}</p>
                                </div>
                                <div class="type_list">`
                    for (let j = 0; j < data[i].types.length; j++){
                        img += `<div class="type ${data[i].types[j].type.name}">${data[i].types[j].type.name}</div>`
                    }
                    img += `</div></div>`
                }
                pokemonList.innerHTML = img;
            }
            renderPokemonList(pokemonElements, size);
            button.addEventListener("click", function() {
                size += 24;
                renderPokemonList(pokemonElements, size);
            });
        }   
        main();
    </script>
</body>
</html>
