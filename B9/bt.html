<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            max-width: 1280px;
            width: 90%;
            margin: auto;
        }
        .button2{
            display: inline-block;
            border: 1px solid rgb(237, 231, 231);
            border-radius: 100px;
            text-align: center;
            align-content: center;
            margin: 5px;
            padding: 10px;
        }
        .box{
            display: flex;
            justify-content: space-between;
        }
        .item{
            margin-top: 40px;
            text-align: left;
            flex: 1;
        }
        .item h3 {
            display: inline-block;
            margin-bottom: 20px;
            border-bottom: 3px solid #ff4d4d;
            object-fit: cover;
            justify-content: space-around;

        }
        .add-skill{
            display: flex;
            margin-top: 20px;
            width: 200px;
            height: 30px;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="item" id="it1">
                <h3>CORE SKILLS</h3>
                <br>
                <div class="button2">JavaScript</div>
                <div class="button2">Node.js</div>
                <div class="button2">Express.js</div>
                <div class="button2">MongoDB</div>
                <div class="button2">Vue.js</div>
                <div class="button2">React</div>
                <div class="button2">Sequelize</div>
                <div class="button2">Github</div>
                <div class="button2">HTML</div>
            </div>
            <div class="item" id="it2">
                <h3>OTHER SKILLS</h3>
                <br>
                <div class="button2">Storyblok</div>
                <div class="button2">PWAs</div>
                <div class="button2">Responsive Web Design</div>
                <div class="button2">React</div>
                <div class="button2">Vuetify</div>
            </div>
        </div>
        <div class="add-skill">
            <input type="text" id="inp1" placeholder="Add Core skills">
            <button id="Button1">Add</button>
        </div>
        <div class="add-skill">
            <input type="text" id="inp2" placeholder="Add Orther skills">
            <button id="Button2">Add</button>
        </div>
    </div>
    <script>
        let but1 = document.getElementById("Button1");
        let but2 = document.getElementById("Button2");
        let item1 = document.getElementById("it1");
        let item2 = document.getElementById("it2");

        but1.addEventListener('click', function(){
            let Cskill = document.getElementById("inp1").value.trim();
            item1.innerHTML += `<div class="button2"> ${Cskill} </div>`;
        });
        but2.addEventListener('click', function(){
            let Oskill = document.getElementById("inp2").value.trim();
            item2.innerHTML += `<div class="button2"> ${Oskill} </div>`;
        });
    </script>
</body>
</html>
